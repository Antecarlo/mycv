name: Generate and Release PDF
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-full

      - name: Generate PDF
        run: |
          pandoc cv-source.md -o CV_Carlos_Antequera.pdf \
          --pdf-engine=xelatex \
          -V geometry:margin=2cm \
          --metadata title=""

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: CV_Carlos_Antequera.pdf
          force: true
